linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - revive
    - exhaustive

linters-settings:
  goimports:
    local-prefixes: gitmulti

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
